name: Create Python Dependency Layer

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build dependencies
        run: bash ./build.sh

      - name: Zip Lambda Layer Files
        run: zip -r python_dependency_layer.zip python/

      - name: Create GitHub Release and Upload Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Python Dependency Layer ${{ github.ref_name }}" \
            --notes "Lambda layer: Python dependencies ${{ github.ref_name }}" \
            python_dependency_layer.zip
